<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            box-sizing: border-box;
        }
        html, body { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            cursor: default; 
        }
        body {
            font-family: "Roboto", sans-serif;
            background-color: #f9f9f9;

            display: flex;
            justify-content: center;
            align-items: center;
            
            opacity: 0;
            animation: fadein 2s forwards;
        }
        h2 {
            font-weight: 300;
            margin-bottom: 25px;
        }
        
        #main {
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        img {
            max-width: 100%;
            height: auto;
            display: inline-block;
            margin-bottom: 30px;
        }

        #progress {
            width: 60%;
            margin: 0 auto;
            border-radius: 10px;
            background-color: #a8a8a8;
            padding: 7px 5px;
        }
        #fill {
            padding: 2px 0;
            background-color: #00b98b;
            width: 35%;
            border-radius: 25px;
            animation: proanimate 2s ease-out;
        }
        #barpercent h3 {
            color: white;
            margin: 0; padding: 0;
        }

        @keyframes fadein  {
            to { opacity: 1; }
        }
        @keyframes proanimate {
            from { width: 0%; }
        }

        @media screen and (max-width: 600px) {
            img {
                max-width: 80%; 
            }
            h1 { font-size: 1.3em; }
            h2 { margin: 1.1em; font-size: 1.1em; }
            #progress {
                width: 85%;
            }
        }
    </style>
    <title>Coming Soon</title>
</head>
<body>
    <div id="main">
        <img src="logo.png" alt="Logo Image">
        </div>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</body>
</html>
